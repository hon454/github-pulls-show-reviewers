name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to package and publish or refresh
        required: false
        type: string

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    runs-on: ubuntu-latest
    env:
      WXT_GITHUB_APP_CLIENT_ID: ${{ vars.WXT_GITHUB_APP_CLIENT_ID }}
      WXT_GITHUB_APP_SLUG: ${{ vars.WXT_GITHUB_APP_SLUG }}
      WXT_GITHUB_APP_NAME: ${{ vars.WXT_GITHUB_APP_NAME }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm prepare
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm verify:release
      - run: pnpm zip

      - name: Resolve release metadata
        id: release_meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag=""
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

          if [ -n "$tag" ] && [ -f "docs/releases/$tag.md" ]; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes_path=docs/releases/$tag.md" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: chrome-extension-package
          path: .output/*-chrome.zip
          include-hidden-files: true

      - if: steps.release_meta.outputs.tag != '' && steps.release_meta.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: .output/*-chrome.zip
          body_path: ${{ steps.release_meta.outputs.notes_path }}

      - if: steps.release_meta.outputs.tag != '' && steps.release_meta.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          files: .output/*-chrome.zip
          generate_release_notes: true

      - name: Authenticate to Google for Chrome Web Store
        if: startsWith(steps.release_meta.outputs.tag, 'v')
        id: google_auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Publish to Chrome Web Store
        if: startsWith(steps.release_meta.outputs.tag, 'v')
        env:
          CWS_ACCESS_TOKEN: ${{ steps.google_auth.outputs.access_token }}
          CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
          CWS_EXTENSION_ID: ${{ vars.CWS_EXTENSION_ID }}
        run: pnpm cws:publish
